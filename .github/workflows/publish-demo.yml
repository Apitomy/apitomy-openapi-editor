name: Publish Demo Application

on:
  push:
    branches: [main]
    paths:
      - 'test-app/**'
      - 'src/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
  workflow_dispatch:

jobs:
  publish-demo:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apitomy'

    steps:
    - name: Checkout apitomy-openapi-editor
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build library
      run: npm run build

    - name: Install test-app dependencies
      run: npm run test-app:install

    - name: Build test application
      run: npm run test-app:build
      env:
        VITE_BASE_PATH: /openapi-editor/demo/

    - name: Checkout website repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        repository: Apitomy/apitomy.github.io
        token: ${{ secrets.ACCESS_TOKEN }}
        path: website

    - name: Copy built demo to website
      run: |
        rm -rf website/openapi-editor/demo
        mkdir -p website/openapi-editor
        cp -r test-app/dist website/openapi-editor/demo

    - name: Commit and push to website
      run: |
        cd website
        git config user.name "apitomy-ci"
        git config user.email "apitomy.ci@gmail.com"
        git add openapi-editor/demo
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update OpenAPI Editor demo application (automated)"
          git push
        fi
